services:
  postgres:
    image: postgres:16
    container_name: flow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: flow
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    container_name: flow-backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20
    container_name: flow-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --webpack -H 0.0.0.0 -p 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    env_file: .env
    environment:
      # `-` без двоеточия: пустая строка в .env сохраняется (для nginx / same origin)
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL-http://localhost:8000}
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: flow-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pg_data:
